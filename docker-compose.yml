version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eqence-db
    environment:
      POSTGRES_USER: eqence
      POSTGRES_PASSWORD: eqence_dev_password
      POSTGRES_DB: eqence
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eqence"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eqence-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eqence-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://eqence:eqence_dev_password@postgres:5432/eqence
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=eqence-dev-jwt-secret
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src

volumes:
  postgres_data:
  redis_data:
