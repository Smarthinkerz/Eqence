version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: eqence-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-eqence}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-eqence}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-eqence}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eqence-network

  redis:
    image: redis:7-alpine
    container_name: eqence-redis-prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eqence-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eqence-api-prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://${DB_USER:-eqence}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-eqence}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - TAP_API_KEY=${TAP_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - eqence-network

  nginx:
    image: nginx:alpine
    container_name: eqence-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./client/dist:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - eqence-network

  certbot:
    image: certbot/certbot
    container_name: eqence-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  redis_data:

networks:
  eqence-network:
    driver: bridge
